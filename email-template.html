<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guestbook Entry</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #09090b;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            line-height: 1.6;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
            background-color: #09090b;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 20px;
        }
        .site-name {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #a1a1aa;
            margin-bottom: 10px;
        }
        .post-title {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 700;
            margin: 0 0 10px 0;
            color: #ffffff;
            line-height: 1.2;
        }
        .author-info {
            text-align: center;
            margin-bottom: 40px;
        }
        .author-name {
            font-weight: 500;
            font-size: 16px;
            color: #ffffff;
        }
        .author-role {
            font-size: 14px;
            color: #a1a1aa;
        }
        .content {
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            color: #e4e4e7;
            margin-bottom: 40px;
        }
        .content p {
            margin-bottom: 16px;
        }
        .content blockquote {
            border-left: 3px solid #ffffff;
            padding-left: 20px;
            margin-left: 0;
            font-style: italic;
            color: #a1a1aa;
        }
        .footer {
            text-align: center;
            font-size: 12px;
            color: #52525b;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="site-name">Online Guestbook</div>
            <div style="font-size: 12px; color: #71717a;">{{date_day}}/{{date_month}}/{{date_year}}</div>
        </div>

        <h1 class="post-title">{{title}}</h1>
        
        <div class="author-info">
            <div class="author-name">{{name}}</div>
            <div class="author-role">{{role}}</div>
        </div>

        <div class="content">
            {{{message}}}
        </div>

        <div class="footer">
            <p>Sent via Online Guestbook</p>
            <p>© 2024 Khoa Nguyen</p>
        </div>
    </div>
</body>
</html>
